name: Build Capacitor Android App

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual triggering from the Actions tab

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Build the React app
      - name: Build React app
        run: npm run build

      # 5. Ensure Capacitor is installed
      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli

      # 6. Initialize Capacitor (if not already initialized)
      - name: Initialize Capacitor
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init "My App" "com.example.myapp" --web-dir=build
          fi

      # 7. Add the Android platform (if not already added)
      - name: Add Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # 8. Sync the web assets with the Android project
      - name: Sync Capacitor
        run: npx cap sync android

      # 9. Set up Java for Android build
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 10. Build the Debug APK
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 11. Upload the APK as a downloadable artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
