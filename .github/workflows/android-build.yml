name: Build Capacitor Android App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js (for your React app)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build the React app
      - name: Build React app
        run: npm run build

      # 5. Ensure Capacitor is available
      - name: Install Capacitor CLI
        run: npm install @capacitor/cli @capacitor/core

      # 6. Sync Capacitor with Android
      - name: Sync Capacitor
        run: npx cap sync android

      # 7. Set up Java for Android build
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 8. Grant execute permission to Gradle
      - name: Grant execute permission
        run: chmod +x android/gradlew

      # 9. Build the Debug APK
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      # 10. Upload the APK as an artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
